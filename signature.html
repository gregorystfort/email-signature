  Self-hosted version (replaces Wisestamp)
  Images hosted at: https://raw.githubusercontent.com/gregorystfort/email-signature/main/images/

  To use: Copy the HTML below into your email client's signature settings.
  Gmail: Settings → See all settings → General → Signature → paste HTML
  Outlook: File → Options → Mail → Signatures → paste HTML
-->
<div dir="ltr">
<table style="direction:ltr;border-collapse:collapse;font-family:Arial,Helvetica,sans-serif;" cellpadding="0" cellspacing="0" border="0">

  </tr>
  <!-- Main signature block -->

    <td>

        <tr>

          </td>

                  </p>
                </td>
              </tr>
              <!-- Contact details -->
              <tr>
                <td style="padding-top:14px;">
                  <table cellpadding="0" cellspacing="0" style="border-collapse:collapse;">
                    <!-- Phone + Website row -->
                    <tr>
                      <td style="white-space:nowrap;font-family:Arial,Helvetica,sans-serif;font-size:11px;line-height:120%;">
                        <img src="https://raw.githubusercontent.com/gregorystfort/email-signature/main/images/icon-phone.png" width="11" style="width:11px;vertical-align:middle;" alt="" />&nbsp;<a href="tel:7133526122" style="font-family:Arial,Helvetica,sans-serif;text-decoration:none;color:#212121;font-size:11px;white-space:nowrap;">7133526122</a>&nbsp;&nbsp;<img src="https://raw.githubusercontent.com/gregorystfort/email-signature/main/images/icon-web.png" width="11" style="width:11px;vertical-align:middle;" alt="" />&nbsp;<a href="https://www.agentmarketingdesk.com" target="_blank" style="font-family:Arial,Helvetica,sans-serif;text-decoration:none;color:#212121;font-size:11px;white-space:nowrap;">www.agentmarketingdesk.com</a>

                    <tr>
                      <td style="padding-top:8px;white-space:nowrap;font-family:Arial,Helvetica,sans-serif;font-size:11px;line-height:120%;">
                        <img src="https://raw.githubusercontent.com/gregorystfort/email-signature/main/images/icon-email.png" width="11" style="width:11px;vertical-align:middle;" alt="" />&nbsp;<a href="mailto:greg@agentmarketingdesk.com" style="font-family:Arial,Helvetica,sans-serif;text-decoration:none;color:#212121;font-size:11px;white-space:nowrap;">greg@agentmarketingdesk.com</a>
