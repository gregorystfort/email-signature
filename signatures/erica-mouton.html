<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Erica Mouton - Email Signature</title>
</head>
<body style="margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif;">

<!-- Signoff GIF -->
<div style="margin-bottom: 20px;">
    <img src="https://raw.githubusercontent.com/gregorystfort/email-signature/main/images/signoff.gif"
         alt="Thank You"
         style="height: 57px; border: 0; display: block;"
         width="auto"
         height="57"
         border="0">
</div>

<!-- Main Signature Table -->
<table cellpadding="0" cellspacing="0" border="0" style="border-collapse: collapse; font-family: Arial, Helvetica, sans-serif;">
    <tr>
        <!-- Left Column: Headshot + Logo -->
        <td style="vertical-align: top; padding-right: 20px;">
            <!-- Headshot -->
            <div style="margin-bottom: 10px;">
                <img src="https://raw.githubusercontent.com/gregorystfort/email-signature/main/images/headshots/erica-mouton-headshot.jpg"
                     alt="Erica Mouton"
                     style="width: 80px; height: 80px; border-radius: 50%; border: 0; display: block;"
                     width="80"
                     height="80"
                     border="0">
            </div>
            <!-- Company Logo -->
            <div>
                <img src="https://raw.githubusercontent.com/gregorystfort/email-signature/main/images/logos/divine-dreams-logo.png"
                     alt="Divine Dreams Real Estate"
                     style="width: 120px; height: auto; border: 0; display: block;"
                     width="120"
                     border="0">
            </div>
        </td>

        <!-- Vertical Divider -->
        <td style="width: 2px; background-color: #BDBDBD; padding: 0; vertical-align: top;">
            <div style="width: 2px; height: 120px; background-color: #BDBDBD;"></div>
        </td>

        <!-- Right Column: Contact Info -->
        <td style="vertical-align: top; padding-left: 20px;">
            <!-- Name -->
            <div style="margin-bottom: 5px;">
                <span style="font-family: Arial, Helvetica, sans-serif; font-size: 16px; font-weight: bold; color: #646464;">Erica Mouton</span>
            </div>

            <!-- Title + Company -->
            <div style="margin-bottom: 10px;">
                <span style="font-family: Arial, Helvetica, sans-serif; font-size: 13px; font-weight: bold; color: #646464;">Broker/Owner • Divine Dreams Real Estate</span>
            </div>

            <!-- Phone + Website -->
            <div style="margin-bottom: 3px;">
                <img src="https://raw.githubusercontent.com/gregorystfort/email-signature/main/images/icon-phone.png"
                     alt="Phone"
                     style="width: 12px; height: 12px; vertical-align: middle; margin-right: 5px; border: 0;"
                     width="12"
                     height="12"
                     border="0">
                <span style="font-family: Arial, Helvetica, sans-serif; font-size: 11px; color: #646464;">(713) 459-4908</span>
                <span style="font-family: Arial, Helvetica, sans-serif; font-size: 11px; color: #646464;">&nbsp;&nbsp;&nbsp;</span>
                <img src="https://raw.githubusercontent.com/gregorystfort/email-signature/main/images/icon-web.png"
                     alt="Website"
                     style="width: 12px; height: 12px; vertical-align: middle; margin-right: 5px; border: 0;"
                     width="12"
                     height="12"
                     border="0">
                <a href="http://www.divinedreamsrealestate.com"
                   style="font-family: Arial, Helvetica, sans-serif; font-size: 11px; color: #646464; text-decoration: none;"
                   target="_blank"
                   rel="nofollow noreferrer">divinedreamsrealestate.com</a>
            </div>

            <!-- Email -->
            <div style="margin-bottom: 3px;">
                <img src="https://raw.githubusercontent.com/gregorystfort/email-signature/main/images/icon-email.png"
                     alt="Email"
                     style="width: 12px; height: 12px; vertical-align: middle; margin-right: 5px; border: 0;"
                     width="12"
                     height="12"
                     border="0">
                <a href="mailto:erica@divinedreamsrealestate.com"
                   style="font-family: Arial, Helvetica, sans-serif; font-size: 11px; color: #646464; text-decoration: none;"
                   target="_blank"
                   rel="nofollow noreferrer">erica@divinedreamsrealestate.com</a>
            </div>

            <!-- Address -->
            <div style="margin-bottom: 10px;">
                <img src="https://raw.githubusercontent.com/gregorystfort/email-signature/main/images/icon-address.png"
                     alt="Address"
                     style="width: 12px; height: 12px; vertical-align: middle; margin-right: 5px; border: 0;"
                     width="12"
                     height="12"
                     border="0">
                <a href="https://maps.google.com/?q=11601+Shadow+Creek+Pkwy+111-176,+Pearland,+TX+77584"
                   style="font-family: Arial, Helvetica, sans-serif; font-size: 11px; color: #646464; text-decoration: none;"
                   target="_blank"
                   rel="nofollow noreferrer">11601 Shadow Creek Pky 111-176, Pearland TX 77584</a>
            </div>
        </td>
    </tr>
</table>

<!-- Social Media Icons -->
<div style="margin-top: 15px;">
    <a href="https://www.facebook.com/EricaMoutonRealtor"
       target="_blank"
       rel="nofollow noreferrer"
       style="text-decoration: none; margin-right: 10px;">
        <img src="https://raw.githubusercontent.com/gregorystfort/email-signature/main/images/icon-facebook.png"
             alt="Facebook"
             style="width: 24px; height: 24px; border-radius: 50%; border: 0;"
             width="24"
             height="24"
             border="0">
    </a>
    <a href="https://www.instagram.com/divinedreamsrealestate/"
       target="_blank"
       rel="nofollow noreferrer"
       style="text-decoration: none;">
        <img src="https://raw.githubusercontent.com/gregorystfort/email-signature/main/images/icon-instagram.png"
             alt="Instagram"
             style="width: 24px; height: 24px; border-radius: 50%; border: 0;"
             width="24"
             height="24"
             border="0">
    </a>
</div>

</body>
</html>
