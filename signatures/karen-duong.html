<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karen Duong - Email Signature</title>
</head>
<body style="margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif;">
    <!-- Signoff GIF -->
    <div style="text-align: left; margin-bottom: 15px;">
        <img src="https://raw.githubusercontent.com/gregorystfort/email-signature/main/images/signoff.gif"
             alt="Thank You"
             style="height: 57px; border: 0; display: block;"
             border="0">
    </div>

    <!-- Main Signature Table -->
    <table style="border-collapse: collapse; margin: 0; padding: 0; font-family: Arial, Helvetica, sans-serif;">
        <tr>
            <!-- Left Column: Headshot + Logo -->
            <td style="vertical-align: top; padding-right: 20px; border-right: 2px solid #BDBDBD;">
                <!-- Headshot -->
                <div style="text-align: center; margin-bottom: 10px;">
                    <img src="https://raw.githubusercontent.com/gregorystfort/email-signature/main/images/headshots/karen-duong-headshot.jpg"
                         alt="Karen Duong"
                         style="width: 80px; height: 80px; border-radius: 50%; border: 0; display: block; margin: 0 auto;"
                         border="0">
                </div>

                <!-- KW Signature Logo -->
                <div style="text-align: center;">
                    <img src="https://raw.githubusercontent.com/gregorystfort/email-signature/main/images/logos/kw-signature-logo.png"
                         alt="Keller Williams Signature"
                         style="width: 120px; height: auto; border: 0; display: block; margin: 0 auto;"
                         border="0">
                </div>
            </td>

            <!-- Right Column: Contact Information -->
            <td style="vertical-align: top; padding-left: 20px;">
                <!-- Name -->
                <div style="color: #646464; font-size: 16px; font-weight: bold; margin-bottom: 2px; font-family: Arial, Helvetica, sans-serif;">
                    Karen Duong
                </div>

                <!-- Title + Company -->
                <div style="color: #646464; font-size: 13px; font-weight: bold; margin-bottom: 8px; font-family: Arial, Helvetica, sans-serif;">
                    Realtor® | Keller Williams Signature
                </div>

                <!-- Phone + Website Row -->
                <div style="color: #646464; font-size: 11px; margin-bottom: 3px; font-family: Arial, Helvetica, sans-serif;">
                    <img src="https://raw.githubusercontent.com/gregorystfort/email-signature/main/images/icon-phone.png"
                         alt="Phone"
                         style="width: 12px; height: 12px; vertical-align: middle; border: 0; margin-right: 5px;"
                         border="0">
                    (832) 610-7976
                    &nbsp;&nbsp;&nbsp;
                    <img src="https://raw.githubusercontent.com/gregorystfort/email-signature/main/images/icon-web.png"
                         alt="Website"
                         style="width: 12px; height: 12px; vertical-align: middle; border: 0; margin-right: 5px;"
                         border="0">
                    <a href="https://kws17.com"
                       style="color: #646464; text-decoration: none;"
                       target="_blank"
                       rel="nofollow noreferrer">kws17.com</a>
                </div>

                <!-- Email Row -->
                <div style="color: #646464; font-size: 11px; margin-bottom: 3px; font-family: Arial, Helvetica, sans-serif;">
                    <img src="https://raw.githubusercontent.com/gregorystfort/email-signature/main/images/icon-email.png"
                         alt="Email"
                         style="width: 12px; height: 12px; vertical-align: middle; border: 0; margin-right: 5px;"
                         border="0">
                    <a href="mailto:karen.duong2447@gmail.com"
                       style="color: #646464; text-decoration: none;"
                       target="_blank"
                       rel="nofollow noreferrer">karen.duong2447@gmail.com</a>
                </div>

                <!-- Address Row -->
                <div style="color: #646464; font-size: 11px; font-family: Arial, Helvetica, sans-serif;">
                    <img src="https://raw.githubusercontent.com/gregorystfort/email-signature/main/images/icon-address.png"
                         alt="Address"
                         style="width: 12px; height: 12px; vertical-align: middle; border: 0; margin-right: 5px;"
                         border="0">
                    <a href="https://maps.google.com/?q=920+S+Fry+Rd,+Katy,+TX+77450"
                       style="color: #646464; text-decoration: none;"
                       target="_blank"
                       rel="nofollow noreferrer">920 S Fry Rd, Katy, TX 77450</a>
                </div>
            </td>
        </tr>
    </table>
</body>
</html>
